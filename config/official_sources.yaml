policy:
  cache_dir: .cache/official-sources
  target_dirs:
    - docs
    - .agent/skills/furuyoni_master/rules
  extensions:
    - .md
    - .html
    - .js
    - .ts
    - .yaml
    - .yml
    - .json
  rule_terms:
    - 間合
    - オーラ
    - ライフ
    - フレア
    - ダスト
    - 集中力
    - 山札
    - 伏せ札
    - 捨て札
    - 切札
    - 通常札
    - 攻撃
    - 行動
    - 付与
    - 対応
    - 全力
    - 前進
    - 後退
    - 纏い
    - 宿し
    - 決死
    - 八相
    - 境地
    - 灰塵
    - 連火
    - 設置
    - 納
    - 展開時
    - 展開中
    - 破棄時
    - 攻撃後
    - 適正距離
  claim_patterns:
    - "[0-9０-９]+[/-][0-9０-９]+"
    - "(?:最大|上限|初期|合計|[0-9０-９]+枚|[0-9０-９]+個|[0-9０-９]+点)"
    - "(?:できる|できない|不可|可能|強制|必ず|のみ|優先|選ぶ|選択)"
  card_claim_patterns:
    - "(?:解説|効果|ダメージ|適正距離|コスト|種別|対応|全力|納|攻撃後|展開時|展開中|破棄時)"
