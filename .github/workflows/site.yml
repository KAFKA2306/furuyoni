name: Build and deploy Furuyoni guide

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - pyproject.toml
      - uv.lock
      - .github/workflows/site.yml
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
      - pyproject.toml
      - uv.lock
      - .github/workflows/site.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: furuyoni-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv
      - name: Install locked dependencies
        run: uv sync --frozen
      - name: Build strict MkDocs site
        run: uv run mkdocs build --strict
      - name: Verify pastel production artifact
        run: |
          set -euo pipefail
          test -s site/index.html
          test -s site/assets/custom.css
          test -s site/assets/furuyoni_style.css
          grep -F -- '--kafka-pastel-build: 20260723' site/assets/furuyoni_style.css
          grep -F -- '--lavender:' site/assets/furuyoni_style.css
          grep -F -- '--rose:' site/assets/furuyoni_style.css
          grep -F -- '--mint:' site/assets/furuyoni_style.css
          grep -F 'data-md-color-scheme="default"' site/index.html
      - name: Inspect active Pages source
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            | jq '{html_url, status, build_type, source, public}'
      - name: Publish gh-pages compatibility branch
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Deploy ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
