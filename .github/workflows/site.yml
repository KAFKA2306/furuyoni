name: Build and deploy Furuyoni guide

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - pyproject.toml
      - uv.lock
      - .github/workflows/site.yml
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
      - pyproject.toml
      - uv.lock
      - .github/workflows/site.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: furuyoni-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv
      - name: Install locked dependencies
        run: uv sync --frozen
      - name: Build strict MkDocs site
        run: uv run mkdocs build --strict
      - name: Verify pastel production artifact
        run: |
          set -euo pipefail
          test -s site/index.html
          test -s site/assets/custom.css
          test -s site/assets/furuyoni_style.css
          grep -F -- '--kafka-pastel-build: 20260723' site/assets/furuyoni_style.css
          grep -F -- '--lavender:' site/assets/furuyoni_style.css
          grep -F -- '--rose:' site/assets/furuyoni_style.css
          grep -F -- '--mint:' site/assets/furuyoni_style.css
          grep -F 'data-md-color-scheme="default"' site/index.html
      - name: Inspect active Pages source
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            | jq '{html_url, status, build_type, source, public}'
      - name: Publish gh-pages compatibility branch
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Deploy ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4

  live-audit:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Inspect active Pages source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            | jq '{html_url, status, build_type, source, public}'

      - name: Verify the real public guide
        shell: bash
        run: |
          set -euo pipefail
          base="https://kafka2306.github.io/furuyoni"
          tmp="$(mktemp -d)"

          matched=false
          for attempt in $(seq 1 36); do
            curl --fail --silent --show-error --location \
              "$base/?smoke=${GITHUB_SHA}-${attempt}" -o "$tmp/index.html"
            curl --fail --silent --show-error --location \
              "$base/assets/furuyoni_style.css?smoke=${GITHUB_SHA}-${attempt}" -o "$tmp/furuyoni.css"
            if grep -Fq -- '--kafka-pastel-build: 20260723' "$tmp/furuyoni.css"; then
              matched=true
              break
            fi
            echo "Live site has not propagated yet (attempt ${attempt})."
            sleep 10
          done
          test "$matched" = true

          grep -F 'data-md-color-scheme="default"' "$tmp/index.html"
          grep -F 'ふるよに 統合ガイド' "$tmp/index.html"
          grep -F -- '--lavender:' "$tmp/furuyoni.css"
          grep -F -- '--rose:' "$tmp/furuyoni.css"
          grep -F -- '--mint:' "$tmp/furuyoni.css"
          grep -F '#sakura-canvas { display: none !important; }' "$tmp/furuyoni.css"

          curl --fail --silent --show-error --location "$base/assets/custom.css?smoke=${GITHUB_SHA}" -o "$tmp/custom.css"
          grep -F '.feature-card' "$tmp/custom.css"
          grep -F '.hero-section' "$tmp/custom.css"

          curl --fail --silent --show-error --location "$base/status.html?smoke=${GITHUB_SHA}" -o "$tmp/status.html"
          grep -F '版・フォーマット' "$tmp/status.html"

          curl --fail --silent --show-error --location "$base/search/search_index.json?smoke=${GITHUB_SHA}" -o "$tmp/search.json"
          python -m json.tool "$tmp/search.json" >/dev/null

          echo "Live Pages audit passed: $base/"
